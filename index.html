<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f2ecdd">
<title>Rhythm Checker</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/app.css">
<link rel="icon" href="icons/icon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
</head>
<body>

<div id="start-overlay" class="poster">
  <div class="poster-dots red-dots" aria-hidden="true"></div>
  <div class="poster-dots blue-dots" aria-hidden="true"></div>
  <div class="poster-vu"><div class="vu" aria-hidden="true"><i></i><i></i><i></i><i></i></div></div>
  <div class="poster-hazard" aria-hidden="true"></div>
  <div class="poster-masthead">
    <div class="mast-line">RHYTHM</div>
    <div class="mast-line checker">CHECKER</div>
  </div>
  <div class="poster-lineup">
    <div class="starburst" aria-hidden="true">
      <svg viewBox="0 0 100 100"><polygon points="50,2 60,26 86,18 74,42 98,50 74,58 86,82 60,74 50,98 40,74 14,82 26,58 2,50 26,42 14,18 40,26" fill="#e8b23a" stroke="#141210" stroke-width="2.5"/></svg>
      <div class="starburst-label">100%<br>HONEST</div>
    </div>
    <button class="bill bill-1" data-goto="rudiments">RUDIMENTS</button>
    <button class="bill bill-2"><span data-goto="tuner">TUNER</span> <b>·</b> <span data-goto="timing">TIMING</span></button>
    <button class="bill bill-2"><span data-goto="preshow">SHOW MODE</span> <b>·</b> <span data-goto="history">HISTORY</span></button>
    <button class="bill bill-3"><span data-goto="calibrate">CALIBRATE</span> <b>·</b> <span data-goto="preshow">PRE-SHOW</span> <b>·</b> <span data-goto="settings">SETTINGS</span></button>
  </div>
  <div class="poster-cta-row">
    <button id="start-btn" class="cta poster-cta">TAP TO START<span class="tri"></span></button>
  </div>
  <p id="start-error" class="poster-error"></p>
  <div class="poster-footer"><div class="barcode" aria-hidden="true"></div></div>
</div>

<div id="app" class="hidden">
  <header class="chrome">
    <div class="chrome-row">
      <div class="chrome-left">
        <button id="nav-back" class="chrome-btn hidden">&#8592; HOME</button>
        <button id="chrome-gear-left" class="gear-btn" title="settings" aria-label="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#141210" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="wordmark"><span>RHY/CHK</span>
        <div class="vu" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="chrome-right">
        <div class="meter" title="mic level"><div id="mic-level"></div></div>
      </div>
    </div>
    <div class="hazard" aria-hidden="true"></div>
  </header>

  <main>
    <section id="mode-home" class="mode"></section>
    <section id="mode-preshow" class="mode"></section>
    <section id="mode-armed" class="mode"></section>
    <section id="mode-verdict" class="mode"></section>
    <section id="mode-tuner" class="mode"></section>
    <section id="mode-rudiments" class="mode"></section>
    <section id="mode-timing" class="mode"></section>
    <section id="mode-calibrate" class="mode"></section>
    <section id="mode-history" class="mode"></section>
  </main>

  <div id="drawer-scrim" class="hidden"></div>
  <aside id="settings" class="hidden">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2>SETTINGS</h2>
      <button id="settings-close" aria-label="close">&#10005;</button>
    </div>
    <div class="drawer-hazard hazard" aria-hidden="true"></div>
    <div id="settings-body"></div>
  </aside>
</div>

<div id="mic-lost" class="overlay hidden" style="position:fixed;inset:0;z-index:50">
  <h1>Microphone lost</h1>
  <p id="mic-lost-reason" class="warn-text"></p>
  <button id="mic-lost-btn" class="cta">Tap to reconnect</button>
</div>

<footer><span id="diag" class="dim"></span></footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
