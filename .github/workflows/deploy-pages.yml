# Free iPhone distribution: publishes webapp/ to GitHub Pages (HTTPS included,
# which iOS requires for microphone access). Open the Pages URL in Safari,
# Share -> Add to Home Screen — installed, offline, $0.
#
# Pages serves from the gh-pages branch (auto-enabled by the first push of that
# branch — no Settings visit needed). This workflow regenerates gh-pages from
# webapp/ on every main push; the branch is a build artifact, so force-push.

name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['webapp/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish webapp/ as the gh-pages branch
        run: |
          cd webapp
          touch .nojekyll  # serve files verbatim, no Jekyll pass
          git init -q -b gh-pages
          git config user.name "Ben Jordan"
          git config user.email "benj9swim@gmail.com"
          git add -A
          git commit -q -m "Deploy webapp @ ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" \
            gh-pages
